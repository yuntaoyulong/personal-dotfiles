# 字体与大小
font_family FiraCode Nerd Font
font_size 14

# 窗口行为
# 适当增加内边距，毛玻璃效果下留白多一点会更有质感
window_padding_width 15
enable_audio_bell no
remember_window_size no

# --- 关键修改：开启透明 ---
# 范围 0.0 (全透) - 1.0 (不透)
# 推荐 0.7 到 0.8，太透了看不清字，太实了没效果
background_opacity 0.75

# --- 进阶：动态模糊支持 ---
# 允许通过快捷键动态调整透明度（可选）
dynamic_background_opacity yes

# 配色方案（Nord）
# 注意：Nord 本身对比度较低，变透明后可能字会有点淡
# 如果看不清，可以考虑换 Catppuccin 或把 Hyprland 的 blur contrast 调高
background #2E3440
foreground #D8DEE9
color0     #3B4252
color1     #BF616A
color2     #A3BE8C
color3     #EBCB8B
color4     #81A1C1
color5     #B48EAD
color6     #88C0D0
color7     #ECEFF4
# 包含 pywal 生成的颜色文件
# 允许外部程序改变 Kitty 的设置（pywal 必须项）
allow_remote_control yes
listen_on unix:/tmp/mykitty
include ~/.cache/wal/colors-kitty.conf
